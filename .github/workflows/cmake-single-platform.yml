name: CMake on a single platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]

permissions:
  contents: read
  packages: write

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

      - name: Test
        working-directory: ${{ github.workspace }}/build
        run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure

  test-ros:
    name: Test zedra_ros (ROS 2)
    runs-on: ubuntu-latest
    # Pin to amd64 so replay determinism test runs natively (no skip); OSRF image is amd64-only.
    container:
      image: osrf/ros:kilted-desktop
      options: --privileged --platform linux/amd64
    steps:
      - uses: actions/checkout@v4

      - name: Install rosbag2 sqlite3 storage
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ros-kilted-rosbag2-storage-default-plugins
          rm -rf /var/lib/apt/lists/*

      - name: Create colcon workspace
        run: |
          mkdir -p ros_ws/src
          cp -r zedra_core zedra_ros ros_ws/src/

      - name: Build and test zedra_ros
        shell: bash
        run: |
          source /opt/ros/kilted/setup.bash
          cd ros_ws
          colcon build --packages-up-to zedra_ros
          source install/setup.bash
          colcon test --packages-select zedra_ros --event-handlers console_direct+
          colcon test-result --verbose

  docker:
    name: Build and push Docker image (multi-arch)
    runs-on: ubuntu-latest
    needs: [ build ]
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      # 🔹 Required for cross-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag_list=ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }},ghcr.io/${{ github.repository }}:latest" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
            echo "tag_list=ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      # Build for amd64 (CI/servers) and arm64 (e.g. Apple Silicon); pull gets correct arch.
      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tag_list }}