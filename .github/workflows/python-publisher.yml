name: Python Publisher Package

on:
  push:
    branches: ["main"]
    paths:
      - "zedra_publisher/**"
  pull_request:
    branches: ["main"]
    paths:
      - "zedra_publisher/**"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install build

      - name: Install package with dev dependencies
        working-directory: zedra_publisher
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: zedra_publisher
        run: pytest tests/ -v

      - name: Build sdist and wheel
        working-directory: zedra_publisher
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zedra-publisher-dist
          path: zedra_publisher/dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    # Publish on release events only.
    # Option 1 (recommended): configure an OIDC Trusted Publisher at pypi.org –
    #   no secret needed; the id-token permission below is sufficient.
    # Option 2: store your PyPI API token as the PYPI_API_TOKEN repository secret
    #   and uncomment the `password:` line in the step below.
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/zedra-publisher/

    permissions:
      id-token: write  # required for OIDC Trusted Publisher

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: zedra-publisher-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # password: ${{ secrets.PYPI_API_TOKEN }}  # uncomment if not using OIDC
